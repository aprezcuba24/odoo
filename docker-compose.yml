version: '3.8'

services:
  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odoo-production
    restart: always
    ports:
      - "8069:8069"
    env_file:
      - .env
    volumes:
      - .:/app:cached
      - odoo-data:/var/lib/odoo
      - odoo-logs:/var/log/odoo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

volumes:
  odoo-data:
    driver: local
  odoo-logs:
    driver: local
