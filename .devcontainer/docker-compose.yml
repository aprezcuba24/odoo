version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: odoo-app
    volumes:
      - ..:/app:cached
    ports:
      - "8069:8069"
    # Inyecta variables de /app/.env (p. ej. ORDER_BRIDGE_FCM_*) hacia el entorno del contenedor; Odoo lee os.environ, no lee .env directamente.
    env_file:
      - path: ../.env
        required: false
    environment:
      - PGHOST=postgres
      - PGUSER=odoo
      - PGPASSWORD=odoo
      - PGDATABASE=odoo
      - PGPORT=5432
      # Writable on the bind mount (container user odoo). Named volume /var/lib/odoo is often root:root and breaks asset bundles + filestore.
      - ODOO_DATA_DIR=/app/.odoo_data
      - ODOO_ADDONS_PATH=/app/odoo/addons,/app/addons,/app/own_modules,/app/oca
    depends_on:
      - postgres
    command: sleep infinity
    networks:
      - odoo-network

  caddy:
    image: caddy:2-alpine
    container_name: odoo-caddy
    ports:
      - "9443:443"
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    networks:
      - odoo-network

  postgres:
    image: postgres:16-alpine
    container_name: odoo-postgres
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - odoo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  odoo-network:
    driver: bridge

